spring:
  application:
    name: feature-flag-platform
  datasource:
    url: ${FEATURE_FLAGS_DB_URL:jdbc:postgresql://localhost:5432/featureflags}
    username: ${FEATURE_FLAGS_DB_USERNAME:featureflags}
    password: ${FEATURE_FLAGS_DB_PASSWORD:featureflags}
  flyway:
    enabled: true

feature-flags:
  security:
    reader-username: ${FEATURE_FLAGS_SECURITY_READER_USERNAME:featureflags-reader}
    reader-password: ${FEATURE_FLAGS_SECURITY_READER_PASSWORD:featureflags-reader}
    operator-username: ${FEATURE_FLAGS_SECURITY_OPERATOR_USERNAME:featureflags-operator}
    operator-password: ${FEATURE_FLAGS_SECURITY_OPERATOR_PASSWORD:featureflags-operator}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoint:
    health:
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
      validate-group-membership: false
    prometheus:
      access: read-only
  endpoints:
    web:
      exposure:
        include: health,prometheus

logging:
  structured:
    format:
      console: ecs
