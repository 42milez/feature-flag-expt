services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: featureflags
      POSTGRES_USER: featureflags
      POSTGRES_PASSWORD: featureflags
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U featureflags -d featureflags"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: feature-flag-platform:compose-local
    build:
      context: ./service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FEATURE_FLAGS_DB_URL: jdbc:postgresql://postgres:5432/featureflags
      FEATURE_FLAGS_DB_USERNAME: featureflags
      FEATURE_FLAGS_DB_PASSWORD: featureflags
    ports:
      - "127.0.0.1:8080:8080"
