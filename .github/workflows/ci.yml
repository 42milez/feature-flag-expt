name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PROMETHEUS_VERSION: 3.12.0
  PROMETHEUS_LINUX_AMD64_SHA256: 20da47f8e5303f74aecb78edd7f7e39041dac08ac4939dba75efd7a900ae8867
  SERVICE_IMAGE: feature-flag-platform:ci-${{ github.sha }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2, verified 2026-05-24
        with:
          persist-credentials: false
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0, verified 2026-05-24
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0, verified 2026-05-26
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0, verified 2026-05-25
        if: github.event_name == 'pull_request'
      - name: Run service checks
        run: ./gradlew :service:spotlessCheck :service:compileJava :service:test --no-daemon
      - name: Render Kubernetes manifests
        run: ./gradlew k8sRenderDev --no-daemon
      - name: Check OpenAPI snapshot drift
        run: |
          ./gradlew :service:generateOpenApiDocs --no-daemon
          git diff --exit-code -- docs/openapi.yaml
      - name: Install promtool
        run: |
          curl -fsSLo "$RUNNER_TEMP/prometheus.tar.gz" "https://github.com/prometheus/prometheus/releases/download/v${PROMETHEUS_VERSION}/prometheus-${PROMETHEUS_VERSION}.linux-amd64.tar.gz"
          echo "${PROMETHEUS_LINUX_AMD64_SHA256}  $RUNNER_TEMP/prometheus.tar.gz" | sha256sum -c -
          mkdir -p "$RUNNER_TEMP/prometheus"
          tar -xzf "$RUNNER_TEMP/prometheus.tar.gz" -C "$RUNNER_TEMP/prometheus" --strip-components=1 "prometheus-${PROMETHEUS_VERSION}.linux-amd64/promtool"
          echo "$RUNNER_TEMP/prometheus" >> "$GITHUB_PATH"
      - name: Validate Prometheus alert rules
        run: promtool check rules deploy/k8s/overlays/dev-observability/prometheus/feature-flag.rules.yml
      - name: Test Prometheus alert rules
        run: promtool test rules feature-flag.rules.test.yml
        working-directory: deploy/k8s/overlays/dev-observability/prometheus
      - name: Package service image jar
        if: github.event_name == 'pull_request'
        run: ./gradlew :service:bootJar --no-daemon
      - name: Build service image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0, verified 2026-05-25
        with:
          context: ./service
          tags: ${{ env.SERVICE_IMAGE }}
          push: false
          load: true
          cache-from: type=gha,scope=feature-flag-platform
          cache-to: type=gha,mode=max,scope=feature-flag-platform
      - name: Scan service image vulnerabilities with Trivy
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0, verified 2026-06-10
        with:
          image-ref: ${{ env.SERVICE_IMAGE }}
          format: json
          output: trivy-high-critical-report.json
          exit-code: "0"
          ignore-unfixed: "false"
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
      - name: Publish Trivy vulnerability summary and enforce gate
        if: github.event_name == 'pull_request' && always()
        run: |
          set -euo pipefail

          if [ ! -s trivy-high-critical-report.json ]; then
            exit 0
          fi

          fixed_count="$(jq '[.Results[]?.Vulnerabilities[]? | select((.FixedVersion // "") != "")] | length' trivy-high-critical-report.json)"
          unfixed_count="$(jq '[.Results[]?.Vulnerabilities[]? | select((.FixedVersion // "") == "")] | length' trivy-high-critical-report.json)"
          total_count="$((fixed_count + unfixed_count))"

          {
            echo "## Trivy high/critical vulnerability report"
            echo
            echo "This report includes OS and library findings even when no fix is currently available."
            echo
            echo "- Fixed version available: ${fixed_count}"
            echo "- No fixed version currently available: ${unfixed_count}"

            if [ "$total_count" -gt 0 ]; then
              echo
              echo '```'
              jq -r '
                .Results[]? as $result
                | $result.Vulnerabilities[]?
                | [
                    ($result.Target // "-"),
                    (.VulnerabilityID // "-"),
                    (.PkgName // "-"),
                    ("installed=" + (.InstalledVersion // "-")),
                    ("fixed=" + (if ((.FixedVersion // "") == "") then "not available" else .FixedVersion end)),
                    ("severity=" + (.Severity // "-"))
                  ]
                | join(" | ")
              ' trivy-high-critical-report.json
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$fixed_count" -gt 0 ]; then
            echo "::error title=Trivy vulnerability gate::Found ${fixed_count} high/critical vulnerabilities with fixed versions."
            exit 1
          fi
