name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PROMETHEUS_VERSION: 3.12.0
  PROMETHEUS_LINUX_AMD64_SHA256: 20da47f8e5303f74aecb78edd7f7e39041dac08ac4939dba75efd7a900ae8867

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3, verified 2026-05-24
        with:
          persist-credentials: false
      - name: Scan repository secrets with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0, verified 2026-06-10
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          exit-code: "1"

  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CODACY_PROJECT_TOKEN_AVAILABLE: ${{ secrets.CODACY_PROJECT_TOKEN != '' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3, verified 2026-05-24
        with:
          persist-credentials: false
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0, verified 2026-05-24
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0, verified 2026-05-26
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: Run service checks
        run: ./gradlew :service:spotlessCheck :service:compileJava --no-daemon
      - name: Run tests and prepare service coverage report for upload
        run: ./gradlew :service:jacocoTestReport --no-daemon
      - name: Upload coverage to Codacy
        if: env.CODACY_PROJECT_TOKEN_AVAILABLE == 'true'
        # The latest tagged action release (v1.3.0) shells out to Codacy's coverage reporter
        # downloader without exposing a way to pin the downloaded reporter binary. Newer action
        # code adds coverage-reporter-version, which sets CODACY_REPORTER_VERSION before running
        # coverage.codacy.com/get.sh. Pin this master commit by full SHA so both layers stay
        # deterministic: the GitHub Action implementation and the reporter CLI it downloads.
        uses: codacy/codacy-coverage-reporter-action@6904bd01e29ada115135b5eca20125758ccae53b # verified 2026-06-14
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: service/build/reports/jacoco/test/jacocoTestReport.xml
          coverage-reporter-version: 14.1.3
      - name: Render Kubernetes manifests
        run: ./gradlew k8sRenderDev --no-daemon
      - name: Check OpenAPI snapshot drift
        run: |
          ./gradlew :service:generateOpenApiDocs --no-daemon
          git diff --exit-code -- docs/openapi.yaml
      - name: Install promtool
        run: |
          curl -fsSLo "$RUNNER_TEMP/prometheus.tar.gz" "https://github.com/prometheus/prometheus/releases/download/v${PROMETHEUS_VERSION}/prometheus-${PROMETHEUS_VERSION}.linux-amd64.tar.gz"
          echo "${PROMETHEUS_LINUX_AMD64_SHA256}  $RUNNER_TEMP/prometheus.tar.gz" | sha256sum -c -
          mkdir -p "$RUNNER_TEMP/prometheus"
          tar -xzf "$RUNNER_TEMP/prometheus.tar.gz" -C "$RUNNER_TEMP/prometheus" --strip-components=1 "prometheus-${PROMETHEUS_VERSION}.linux-amd64/promtool"
          echo "$RUNNER_TEMP/prometheus" >> "$GITHUB_PATH"
      - name: Validate Prometheus alert rules
        run: promtool check rules deploy/k8s/overlays/dev-observability/prometheus/feature-flag.rules.yaml
      - name: Test Prometheus alert rules
        run: promtool test rules feature-flag.rules.test.yaml
        working-directory: deploy/k8s/overlays/dev-observability/prometheus
