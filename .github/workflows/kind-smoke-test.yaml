name: Kind Smoke Test

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kind-smoke-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3, verified 2026-05-24
        with:
          persist-credentials: false
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0, verified 2026-05-24
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0, verified 2026-05-26
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-cleanup: never
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0, verified 2026-05-24
        with:
          config: deploy/kind/cluster.yaml
          cluster_name: feature-flag-platform
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0, verified 2026-05-25
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0, verified 2026-05-25
        with:
          context: .
          file: service/Dockerfile
          tags: feature-flag-platform:local
          push: false
          outputs: type=docker,dest=/tmp/feature-flag-platform.tar
          cache-from: type=gha,scope=feature-flag-platform
          cache-to: type=gha,mode=max,scope=feature-flag-platform
      - run: kind load image-archive /tmp/feature-flag-platform.tar --name feature-flag-platform
      - run: ./gradlew k8sApplyDev k8sWaitDev k8sStatusDev
      - name: Smoke test application health endpoints
        run: |
          set -euo pipefail

          kubectl -n feature-flag-platform port-forward service/feature-flag-platform 8080:8080 &
          port_forward_pid=$!
          trap 'kill "${port_forward_pid}" 2>/dev/null || true' EXIT

          ./gradlew appHealth
      - name: Collect Kubernetes diagnostics
        if: failure()
        run: |
          kubectl get nodes -o wide || true
          kubectl get all -n feature-flag-platform -o wide || true
          kubectl describe pods -n feature-flag-platform || true
          kubectl logs -n feature-flag-platform -l app.kubernetes.io/name=feature-flag-platform --all-containers --tail=200 || true
          kubectl logs -n feature-flag-platform -l app.kubernetes.io/name=feature-flag-postgres --all-containers --tail=200 || true
