name: Kind Smoke Test

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2, verified 2026-05-24
        with:
          persist-credentials: false
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0, verified 2026-05-24
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle
      - run: ./gradlew :service:bootJar --no-daemon
      - run: docker build -t feature-flag-platform:local ./service

  kind-smoke-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    # Gate the smoke test on Docker image buildability. Jobs run on separate
    # runners, so devDeploy rebuilds and loads the image again for kind.
    needs: docker-build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2, verified 2026-05-24
        with:
          persist-credentials: false
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0, verified 2026-05-24
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0, verified 2026-05-24
        with:
          config: deploy/kind/cluster.yaml
          cluster_name: feature-flag-platform
      - run: ./gradlew devDeploy --no-daemon
      - name: Collect Kubernetes diagnostics
        if: failure()
        run: |
          kubectl get nodes -o wide || true
          kubectl get all -n feature-flag-platform -o wide || true
          kubectl describe pods -n feature-flag-platform || true
          kubectl logs -n feature-flag-platform -l app.kubernetes.io/name=feature-flag-platform --all-containers --tail=200 || true
          kubectl logs -n feature-flag-platform -l app.kubernetes.io/name=feature-flag-postgres --all-containers --tail=200 || true
