apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: feature-flag-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prometheus
          image: prom/prometheus:v3.12.0
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yaml
            - --storage.tsdb.path=/prometheus
            - --web.console.libraries=/etc/prometheus/console_libraries
            - --web.console.templates=/etc/prometheus/consoles
            - --log.format=json
          ports:
            - name: web
              containerPort: 9090
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yaml
              subPath: prometheus.yaml
              readOnly: true
            - name: prometheus-rules
              mountPath: /etc/prometheus/rules/feature-flag.rules.yaml
              subPath: feature-flag.rules.yaml
              readOnly: true
            - name: feature-flag-platform-secret
              mountPath: /etc/prometheus/secrets
              readOnly: true
            - name: prometheus-data
              mountPath: /prometheus
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-rules
          configMap:
            name: feature-flag-prometheus-rules
        - name: feature-flag-platform-secret
          secret:
            secretName: feature-flag-platform-secret
        - name: prometheus-data
          emptyDir:
            sizeLimit: 512Mi
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
