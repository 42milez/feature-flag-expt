rule_files:
  - feature-flag.rules.yaml

evaluation_interval: 1m

tests:
  - interval: 1m
    input_series:
      - series: feature_flag_kill_switch_enabled_total
        values: "0+0x14 1+0x20"
    alert_rule_test:
      - eval_time: 20m
        alertname: FeatureFlagKillSwitchActivated
        exp_alerts:
          - exp_labels:
              severity: warning
              service: feature-flag-platform
            exp_annotations:
              summary: Feature flag kill switch was activated
              description: At least one feature flag kill switch was enabled in the last 15 minutes.
              runbook_url: https://github.com/42milez/feature-flag-expt/blob/main/docs/observability.md#alerting

  - interval: 1m
    input_series:
      - series: 'up{job="feature-flag-platform-local"}'
        values: "1+0x40"
    alert_rule_test:
      - eval_time: 26m
        alertname: FeatureFlagEvaluationTrafficMissing
        exp_alerts:
          - exp_labels:
              severity: warning
              service: feature-flag-platform
            exp_annotations:
              summary: Feature flag evaluation traffic is missing
              description: Prometheus can scrape the feature flag service, but no evaluation counter increments have been observed for at least 15 minutes plus the alert hold window.
              runbook_url: https://github.com/42milez/feature-flag-expt/blob/main/docs/observability.md#alerting

  - interval: 1m
    input_series:
      - series: 'up{job="feature-flag-platform-local"}'
        values: "1+0x40"
      - series: feature_flag_evaluation_total
        values: "0+0x40"
    alert_rule_test:
      - eval_time: 26m
        alertname: FeatureFlagEvaluationTrafficMissing
        exp_alerts:
          - exp_labels:
              severity: warning
              service: feature-flag-platform
            exp_annotations:
              summary: Feature flag evaluation traffic is missing
              description: Prometheus can scrape the feature flag service, but no evaluation counter increments have been observed for at least 15 minutes plus the alert hold window.
              runbook_url: https://github.com/42milez/feature-flag-expt/blob/main/docs/observability.md#alerting

  - interval: 1m
    input_series:
      - series: 'up{job="feature-flag-platform-local"}'
        values: "0+0x40"
    alert_rule_test:
      - eval_time: 26m
        alertname: FeatureFlagEvaluationTrafficMissing
        exp_alerts: []

  - interval: 1m
    input_series:
      - series: 'up{job="feature-flag-platform-local"}'
        values: "1+0x40"
      - series: feature_flag_evaluation_total
        values: "0+1x40"
    alert_rule_test:
      - eval_time: 26m
        alertname: FeatureFlagEvaluationTrafficMissing
        exp_alerts: []

  - interval: 1m
    input_series:
      - series: 'jvm_memory_used_bytes{area="heap"}'
        values: "900+0x10"
      - series: 'jvm_memory_max_bytes{area="heap"}'
        values: "1000+0x10"
    alert_rule_test:
      - eval_time: 6m
        alertname: FeatureFlagJvmHeapUsageHigh
        exp_alerts:
          - exp_labels:
              severity: warning
              service: feature-flag-platform
            exp_annotations:
              summary: Feature flag service JVM heap usage is high
              description: JVM heap usage has been above 85% for 5 minutes. Check GC logs, traffic pattern, and memory limit settings.
              runbook_url: https://github.com/42milez/feature-flag-expt/blob/main/docs/observability.md#alerting

  - interval: 1m
    input_series:
      - series: 'jvm_memory_used_bytes{area="heap"}'
        values: "700+0x10"
      - series: 'jvm_memory_max_bytes{area="heap"}'
        values: "1000+0x10"
    alert_rule_test:
      - eval_time: 6m
        alertname: FeatureFlagJvmHeapUsageHigh
        exp_alerts: []
