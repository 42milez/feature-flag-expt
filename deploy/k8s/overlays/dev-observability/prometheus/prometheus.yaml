global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/feature-flag.rules.yaml

scrape_configs:
  - job_name: feature-flag-platform-kind
    metrics_path: /actuator/prometheus
    basic_auth:
      username_file: /etc/prometheus/secrets/FEATURE_FLAGS_SECURITY_READER_USERNAME
      password_file: /etc/prometheus/secrets/FEATURE_FLAGS_SECURITY_READER_PASSWORD
    static_configs:
      - targets:
          - feature-flag-platform:8080
