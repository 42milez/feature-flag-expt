apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - platform/namespace.yaml
  - prometheus/deployment.yaml
  - prometheus/service.yaml
  - grafana/deployment.yaml
  - grafana/service.yaml
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: prometheus-config
    namespace: feature-flag-platform
    files:
      - prometheus/prometheus.yaml
  - name: feature-flag-prometheus-rules
    namespace: feature-flag-platform
    files:
      - feature-flag.rules.yaml=prometheus/feature-flag.rules.yaml
  - name: grafana-datasource
    namespace: feature-flag-platform
    files:
      - datasource.yaml=grafana/datasource.yaml
  - name: grafana-dashboard-provider
    namespace: feature-flag-platform
    files:
      - dashboards.yaml=grafana/dashboards.yaml
  - name: feature-flag-grafana-dashboard
    namespace: feature-flag-platform
    files:
      - feature-flag-overview.json=grafana/dashboards/feature-flag-overview.json
secretGenerator:
  - name: grafana-admin-secret
    namespace: feature-flag-platform
    # Development-only placeholders for local kind verification.
    literals:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
