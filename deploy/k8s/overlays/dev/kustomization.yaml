apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - database/postgres-service.yaml
  - database/postgres-statefulset.yaml
images:
  - name: feature-flag-platform
    newTag: local
patches:
  - path: patches/add-wait-for-postgres.yaml
  - target:
      kind: Deployment
      name: feature-flag-platform
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: feature-flag-platform
      spec:
        template:
          spec:
            nodeSelector:
              node-pool: workloads
  - target:
      kind: StatefulSet
      name: feature-flag-postgres
    patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: feature-flag-postgres
      spec:
        template:
          spec:
            nodeSelector:
              node-pool: workloads
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: feature-flag-platform-config
    namespace: feature-flag-platform
    literals:
      - FEATURE_FLAGS_DB_URL=jdbc:postgresql://feature-flag-postgres:5432/featureflags
secretGenerator:
  - name: feature-flag-platform-secret
    namespace: feature-flag-platform
    # Development-only placeholders. In production, source credentials from an external
    # secret management service so real secrets are not committed to Git and can be
    # rotated, audited, and access-controlled independently.
    literals:
      - FEATURE_FLAGS_DB_USERNAME=featureflags
      - FEATURE_FLAGS_DB_PASSWORD=featureflags
      - FEATURE_FLAGS_SECURITY_READER_USERNAME=featureflags-reader
      - FEATURE_FLAGS_SECURITY_READER_PASSWORD=featureflags-reader
      - FEATURE_FLAGS_SECURITY_OPERATOR_USERNAME=featureflags-operator
      - FEATURE_FLAGS_SECURITY_OPERATOR_PASSWORD=featureflags-operator
