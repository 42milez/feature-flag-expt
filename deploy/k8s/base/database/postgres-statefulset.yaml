apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: feature-flag-postgres
  namespace: feature-flag-platform
spec:
  serviceName: feature-flag-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: feature-flag-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: feature-flag-postgres
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: featureflags
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: feature-flag-platform-secret
                  key: FEATURE_FLAGS_DB_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: feature-flag-platform-secret
                  key: FEATURE_FLAGS_DB_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
