global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Kubernetes pod-discovery example. The Kubernetes manifests in this
  # repository do not deploy Prometheus or load this configuration.
  #
  # Prometheus needs Kubernetes API access, RBAC, and network access to the
  # application pods. The relabeling rules below read the annotations from
  # deploy/k8s/base/app/deployment.yaml.
  #
  # Before using this job, add basic_auth with credentials mounted from a
  # Kubernetes Secret. /actuator/prometheus rejects unauthenticated scrapes.
  - job_name: feature-flag-platform-pods
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - feature-flag-platform
    relabel_configs:
      - source_labels:
          - __meta_kubernetes_pod_annotation_prometheus_io_scrape
        action: keep
        regex: "true"
      - source_labels:
          - __meta_kubernetes_pod_annotation_prometheus_io_path
        action: replace
        target_label: __metrics_path__
        regex: "(.+)"
      - source_labels:
          - __address__
          - __meta_kubernetes_pod_annotation_prometheus_io_port
        action: replace
        target_label: __address__
        regex: "([^:]+)(?::\\d+)?;(\\d+)"
        replacement: "$1:$2"
      - source_labels:
          - __meta_kubernetes_namespace
        action: replace
        target_label: namespace
      - source_labels:
          - __meta_kubernetes_pod_name
        action: replace
        target_label: pod
      - source_labels:
          - __meta_kubernetes_pod_label_app_kubernetes_io_name
        action: replace
        target_label: app
